## render.yaml — Deploy automático no Render
## Documentação: https://render.com/docs/blueprint-spec
##
## ATENÇÃO: O PostgreSQL gratuito do Render foi descontinuado.
## Use o Neon (neon.tech) para banco gratuito e cole a URL em DATABASE_URL.

services:
  - type: web
    name: jack-mariano-confeitaria
    runtime: python
    region: oregon
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120

    healthCheckPath: /health

    envVars:
      # Cole aqui a URL do seu PostgreSQL (ex: Neon, Supabase, Railway)
      - key: DATABASE_URL
        sync: false

      # Chave secreta do Flask: gerada automaticamente pelo Render
      - key: SECRET_KEY
        generateValue: true

      - key: ADMIN_USER
        value: admin

      # Defina manualmente no dashboard: Environment → ADMIN_PASSWORD
      - key: ADMIN_PASSWORD
        sync: false

      - key: FLASK_ENV
        value: production
