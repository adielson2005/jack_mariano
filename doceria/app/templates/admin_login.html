<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Acesso Admin – Jack Mariano Confeitaria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    /* ── Tokens (mesmo do sistema principal) ────────────────── */
    :root {
      --pk:      #e5196b;
      --pk-soft: #fdf0f6;
      --pk-dark: #b8105a;
      --bg:      #f7f4fb;
      --surface: #ffffff;
      --border:  #ede8f5;
      --text:    #1c1c2e;
      --muted:   #8a87a0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* ── Header topo ─────────────────────────────────────────── */
    .site-header {
      position: fixed; top: 0; left: 0; right: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: 60px;
      display: flex; align-items: center; padding: 0 24px;
      z-index: 100;
    }
    .brand {
      font-weight: 800; font-size: 1rem; color: var(--text);
      display: flex; align-items: center; gap: 8px;
      text-decoration: none;
    }
    .brand-dot {
      width: 28px; height: 28px; border-radius: 8px;
      background: linear-gradient(135deg, var(--pk) 0%, #ff6eb0 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; flex-shrink: 0;
    }

    /* ── Card de login ───────────────────────────────────────── */
    .login-wrap {
      width: 100%; max-width: 420px;
      margin-top: 60px; /* espaço do header fixo */
    }

    .login-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      padding: 48px 36px 40px;
      box-shadow: 0 4px 40px rgba(229, 25, 107, 0.07);
    }

    /* ── Topo do card ────────────────────────────────────────── */
    .card-head {
      text-align: center;
      margin-bottom: 36px;
    }
    .card-icon {
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(135deg, var(--pk) 0%, #ff6eb0 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; margin: 0 auto 18px;
      box-shadow: 0 8px 24px rgba(229, 25, 107, 0.25);
    }
    .card-head h1 {
      font-size: 1.25rem; font-weight: 800; color: var(--text);
      margin-bottom: 6px;
    }
    .card-head p {
      font-size: .82rem; color: var(--muted); font-weight: 500;
    }

    /* ── Erro ────────────────────────────────────────────────── */
    .err-box {
      background: #fff1f5;
      border: 1.5px solid #fecdd9;
      color: #be123c;
      border-radius: 12px;
      padding: 12px 15px;
      font-size: .84rem;
      font-weight: 600;
      margin-bottom: 24px;
      display: flex; align-items: center; gap: 8px;
    }
    .err-box i { font-size: 1rem; flex-shrink: 0; }

    /* ── Campos ──────────────────────────────────────────────── */
    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: .72rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .09em;
      margin-bottom: 8px;
    }

    .input-wrap { position: relative; }

    .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 1rem; pointer-events: none;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: .9rem;
      font-weight: 500;
      padding: 13px 44px 13px 42px;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--pk);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(229, 25, 107, .1);
    }
    input::placeholder { color: #c4bdd8; font-weight: 400; }

    .eye-btn {
      position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 1rem; padding: 0;
      transition: color .18s; line-height: 1;
    }
    .eye-btn:hover { color: var(--pk); }

    /* ── Botão submit ────────────────────────────────────────── */
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--pk) 0%, #f54d94 100%);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-weight: 700;
      font-size: .95rem;
      cursor: pointer;
      transition: opacity .18s, transform .14s, box-shadow .18s;
      box-shadow: 0 4px 16px rgba(229, 25, 107, .25);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 8px;
    }
    .btn-submit:hover {
      opacity: .92;
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(229, 25, 107, .32);
    }
    .btn-submit:active { transform: translateY(0); opacity: 1; }

    /* ── Rodapé do card ──────────────────────────────────────── */
    .card-footer {
      border-top: 1px solid var(--border);
      margin-top: 28px; padding-top: 22px;
      text-align: center;
    }
    .back-link {
      color: var(--muted);
      font-size: .82rem;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 6px;
      transition: color .18s;
    }
    .back-link:hover { color: var(--pk); }

    /* ── Badge "acesso restrito" ─────────────────────────────── */
    .restricted-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: #fff1f5; color: #be123c;
      border: 1px solid #fecdd9;
      border-radius: 999px;
      padding: 4px 12px;
      font-size: .72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .07em;
      margin-bottom: 32px;
    }

    /* ── Responsivo ──────────────────────────────────────────── */
    @media (max-width: 480px) {
      .login-card { padding: 36px 24px 32px; border-radius: 20px; }
    }
  </style>
</head>
<body>

  <!-- Header fixo igual ao site -->
  <header class="site-header">
    <a href="/" class="brand">
      <div class="brand-dot">🧁</div>
      Jack Mariano Confeitaria
    </a>
  </header>

  <div class="login-wrap">

    <div style="text-align:center; margin-bottom: 10px;">
      <span class="restricted-badge">
        <i class="bi bi-lock-fill"></i> Área restrita
      </span>
    </div>

    <div class="login-card">

      <div class="card-head">
        <div class="card-icon">🧁</div>
        <h1>Acesso ao Painel</h1>
        <p>Entre com suas credenciais de administrador</p>
      </div>

      {% if error %}
      <div class="err-box">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form method="POST" autocomplete="on">

        <div class="field">
          <label for="username">Usuário</label>
          <div class="input-wrap">
            <i class="bi bi-person input-icon"></i>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="seu usuário"
              autocomplete="username"
              required
              autofocus
            >
          </div>
        </div>

        <div class="field">
          <label for="pwd">Senha</label>
          <div class="input-wrap">
            <i class="bi bi-key input-icon"></i>
            <input
              type="password"
              id="pwd"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            >
            <button type="button" class="eye-btn" onclick="togglePwd()" aria-label="Mostrar senha">
              <i class="bi bi-eye" id="eye-icon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-submit">
          <i class="bi bi-box-arrow-in-right"></i>
          Entrar no painel
        </button>

      </form>

      <div class="card-footer">
        <a href="/" class="back-link">
          <i class="bi bi-arrow-left"></i>
          Voltar ao site
        </a>
      </div>

    </div>
  </div>

  <script>
    function togglePwd() {
      const input = document.getElementById('pwd');
      const icon  = document.getElementById('eye-icon');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      icon.className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
    }

    // Pressionar Enter no campo de usuário foca na senha
    document.getElementById('username').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('pwd').focus();
      }
    });
  </script>
</body>
</html>
