<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login – Jack Mariano Confeitaria</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1e1e2e;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 20px;
    }
    .card {
      background: #181825;
      border: 1px solid #313244;
      border-radius: 22px;
      padding: 48px 40px;
      width: 100%; max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,.45);
    }
    .brand {
      text-align: center; margin-bottom: 38px;
    }
    .brand-icon {
      width: 68px; height: 68px; border-radius: 20px;
      background: linear-gradient(135deg, #cba6f7 0%, #f38ba8 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; margin: 0 auto 16px;
    }
    .brand-name { color: #cdd6f4; font-weight: 700; font-size: 1.05rem; }
    .brand-sub  { color: #6c7086; font-size: .78rem; margin-top: 5px; }

    .err-box {
      background: rgba(243,139,168,.12);
      border: 1px solid rgba(243,139,168,.3);
      color: #f38ba8; border-radius: 10px;
      padding: 11px 14px; font-size: .84rem; margin-bottom: 22px;
      display: flex; align-items: center; gap: 8px;
    }

    label {
      display: block; color: #a6adc8;
      font-size: .72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .09em;
      margin-bottom: 7px;
    }
    .field { margin-bottom: 18px; }
    .input-wrap { position: relative; }
    input[type=text], input[type=password] {
      width: 100%;
      background: #313244; border: 1.5px solid #45475a;
      border-radius: 11px; color: #cdd6f4;
      font-size: .9rem; padding: 12px 42px 12px 14px;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    input:focus {
      border-color: #cba6f7;
      box-shadow: 0 0 0 3px rgba(203,166,247,.15);
    }
    input::placeholder { color: #585b70; }
    .eye-btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #585b70;
      cursor: pointer; font-size: 1rem; padding: 0;
      transition: color .18s;
    }
    .eye-btn:hover { color: #a6adc8; }

    .btn-submit {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #cba6f7 0%, #b4befe 100%);
      color: #1e1e2e; border: none; border-radius: 13px;
      font-weight: 700; font-size: .95rem; cursor: pointer;
      transition: opacity .18s, transform .14s;
      margin-top: 6px;
    }
    .btn-submit:hover { opacity: .91; transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }

    .back {
      display: block; text-align: center; margin-top: 26px;
      color: #6c7086; font-size: .8rem; text-decoration: none;
      transition: color .18s;
    }
    .back:hover { color: #a6adc8; }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-icon">🧁</div>
    <div class="brand-name">Jack Mariano Confeitaria</div>
    <div class="brand-sub">Acesso ao painel administrativo</div>
  </div>

  {% if error %}
  <div class="err-box">
    <i class="bi bi-exclamation-circle-fill"></i> {{ error }}
  </div>
  {% endif %}

  <form method="POST" autocomplete="on">
    <div class="field">
      <label for="username">Usuário</label>
      <div class="input-wrap">
        <input type="text" id="username" name="username"
               placeholder="seu usuário" autocomplete="username" required autofocus>
      </div>
    </div>
    <div class="field">
      <label for="password">Senha</label>
      <div class="input-wrap">
        <input type="password" id="pwd" name="password"
               placeholder="••••••••" autocomplete="current-password" required>
        <button type="button" class="eye-btn" onclick="togglePwd()" aria-label="Mostrar senha">
          <i class="bi bi-eye" id="eye-icon"></i>
        </button>
      </div>
    </div>
    <button type="submit" class="btn-submit">
      <i class="bi bi-box-arrow-in-right me-1"></i> Entrar no painel
    </button>
  </form>

  <a href="/" class="back">
    <i class="bi bi-arrow-left me-1"></i>Voltar ao site
  </a>
</div>

<script>
function togglePwd() {
  const i = document.getElementById('pwd');
  const e = document.getElementById('eye-icon');
  i.type = i.type === 'password' ? 'text' : 'password';
  e.className = i.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
</script>
</body>
</html>
